# Nginx configuration for Health-Bridge reverse proxy.
#
# Drop into /etc/nginx/sites-available/ and symlink to sites-enabled/.
# Reload with: nginx -t && systemctl reload nginx
#
# This block ONLY adds the /health/ location. It must be placed inside
# the existing server { } block that handles TLS on port 443.
# Do NOT remove or modify existing /chat/ or other locations.

# --- Health-Bridge reverse proxy ---
location ^~ /health/ {
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow up to 100MB upload (gzip SQLite snapshots).
    client_max_body_size 100m;

    # Timeout for long-running ingest.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}
# --- End Health-Bridge ---
